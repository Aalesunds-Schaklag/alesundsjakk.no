services:
  nginx:
    image: ghcr.io/aalesunds-schaklag/alesundsjakk-nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - uploads:/var/www/uploads:ro
    depends_on:
      - backend
      - cms
    restart: unless-stopped

  backend:
    image: ghcr.io/aalesunds-schaklag/alesundsjakk-backend:latest
    env_file: .env
    volumes:
      - uploads:/app/uploads
    expose:
      - "8000"
    restart: unless-stopped

  cms:
    image: ghcr.io/aalesunds-schaklag/alesundsjakk-cms:latest
    env_file: .env
    environment:
      DJANGO_DEBUG: "False"
      ALLOWED_HOSTS: "alesundsjakk.no,www.alesundsjakk.no,cms"
      CSRF_TRUSTED_ORIGINS: "https://alesundsjakk.no,https://www.alesundsjakk.no"
      WAGTAILADMIN_BASE_URL: "https://alesundsjakk.no"
    volumes:
      - cms-media:/app/media
    expose:
      - "8001"
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"

volumes:
  uploads:
  cms-media:
  certbot-certs:
  certbot-www:
