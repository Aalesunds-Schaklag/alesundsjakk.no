services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alesundsjakk
      POSTGRES_USER: alesundsjakk
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  cms:
    build: ./cms
    environment:
      DATABASE_URL: postgresql://alesundsjakk:devpassword@db:5432/alesundsjakk
      DJANGO_DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,cms,0.0.0.0"
      CSRF_TRUSTED_ORIGINS: "http://localhost:5173,http://localhost:8001"
    ports:
      - "8001:8001"
    volumes:
      - ./cms:/app
      - cms-static:/app/staticfiles
    depends_on:
      - db
    command: python manage.py runserver 0.0.0.0:8001

  playwright:
    build: ./playwright
    container_name: playwright-mcp
    stdin_open: true
    network_mode: host

volumes:
  postgres-data:
  cms-static:
